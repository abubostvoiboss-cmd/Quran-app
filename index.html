<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Құран сөздері — жаттау қосымшасы</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F2E2B;
    --bg-2: #163B36;
    --bg-3: #1E4C45;
    --gold: #C9A227;
    --gold-bright: #E4C766;
    --gold-soft: #8B6F1F;
    --parchment: #F8F3E6;
    --parchment-2: #EFE7D2;
    --ink: #2B2519;
    --ink-soft: #6B5F45;
    --brick: #8C4A38;
    --brick-soft: #A6604C;
    --line: rgba(201,162,39,0.28);
    --shadow: 0 18px 40px rgba(0,0,0,0.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(120% 140% at 50% -10%, var(--bg-3) 0%, var(--bg) 55%, #081916 100%);
    color: var(--parchment);
    font-family: 'Lora', serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .shell{
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    padding: 22px 18px 110px;
  }
  .app-header{
    text-align:center;
    padding: 14px 6px 20px;
    position: relative;
  }
  .ornament-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-bottom: 6px;
    opacity: .85;
  }
  .ornament-row svg{ width:26px; height:26px; }
  .eyebrow{
    font-family:'Manrope',sans-serif;
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color: var(--gold-bright);
    font-weight:700;
    margin: 0 0 4px;
  }
  h1.title{
    font-family:'Amiri', serif;
    font-size: 34px;
    margin: 0 0 6px;
    color: var(--parchment);
    font-weight:700;
    letter-spacing: .01em;
  }
  .subtitle{
    font-family:'Manrope',sans-serif;
    font-size: 13px;
    color: rgba(248,243,230,0.62);
    margin: 0;
  }

  .progress-ring-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 14px;
    margin-top: 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 14px 18px;
  }
  .ring-num{
    font-family:'Manrope',sans-serif;
    font-weight:800;
    font-size: 20px;
    color: var(--gold-bright);
  }
  .ring-label{
    font-family:'Manrope',sans-serif;
    font-size:12px;
    color: rgba(248,243,230,0.65);
    line-height:1.35;
  }

  /* Category grid */
  .cat-grid{
    display:grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-top: 22px;
  }
  .cat-card{
    display:flex;
    align-items:center;
    gap: 14px;
    background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 14px 16px;
    cursor:pointer;
    transition: transform .15s ease, border-color .15s ease, background .15s ease;
    text-align: right;
  }
  .cat-card:hover{ transform: translateY(-2px); border-color: rgba(201,162,39,0.55); }
  .cat-card:active{ transform: translateY(0px) scale(.99); }
  .cat-num{
    flex: 0 0 auto;
    width: 44px; height:44px;
    border-radius: 50%;
    background: rgba(201,162,39,0.12);
    border: 1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family:'Amiri', serif;
    font-size: 20px;
    color: var(--gold-bright);
  }
  .cat-body{ flex: 1 1 auto; text-align:left; }
  .cat-name{
    font-family:'Lora', serif;
    font-weight:600;
    font-size: 16.5px;
    color: var(--parchment);
    margin: 0 0 2px;
  }
  .cat-desc{
    font-family:'Manrope',sans-serif;
    font-size: 11.5px;
    color: rgba(248,243,230,0.55);
    margin: 0 0 8px;
  }
  .bar-track{
    height: 5px;
    border-radius: 4px;
    background: rgba(255,255,255,0.08);
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background: linear-gradient(90deg, var(--gold-soft), var(--gold-bright));
    border-radius: 4px;
  }
  .cat-count{
    flex: 0 0 auto;
    font-family:'Manrope',sans-serif;
    font-size: 11px;
    color: rgba(248,243,230,0.5);
    text-align:right;
    min-width: 46px;
  }

  /* Floating review button */
  .review-fab{
    position: fixed;
    left: 50%;
    bottom: 22px;
    transform: translateX(-50%);
    width: calc(100% - 36px);
    max-width: 444px;
    background: linear-gradient(120deg, var(--brick), var(--brick-soft));
    color: var(--parchment);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size: 14.5px;
    cursor:pointer;
    box-shadow: var(--shadow);
    z-index: 40;
  }
  .review-fab .badge{
    background: rgba(0,0,0,0.28);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 12.5px;
    font-weight:800;
  }
  .review-fab.empty{ opacity:.5; cursor:default; }

  /* Session screen */
  .session-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom: 18px;
  }
  .back-btn{
    font-family:'Manrope',sans-serif;
    font-size: 13px;
    color: var(--gold-bright);
    background: none;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 12px;
    cursor:pointer;
  }
  .session-title{
    font-family:'Lora',serif;
    font-weight:600;
    font-size: 15px;
    color: var(--parchment);
    text-align:center;
    flex: 1;
  }
  .session-progress{
    font-family:'Manrope',sans-serif;
    font-size: 12px;
    color: rgba(248,243,230,0.55);
    min-width: 48px;
    text-align:right;
  }
  .track-outer{
    height:4px;
    background: rgba(255,255,255,0.08);
    border-radius:4px;
    margin-bottom: 30px;
    overflow:hidden;
  }
  .track-inner{
    height:100%;
    background: var(--gold);
    border-radius:4px;
    transition: width .25s ease;
  }

  /* Flashcard */
  .card-stage{
    perspective: 1400px;
    margin: 10px auto 26px;
  }
  .card{
    position:relative;
    width:100%;
    aspect-ratio: 4/5;
    max-height: 420px;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.2,.9,.25,1);
    cursor:pointer;
  }
  .card.flipped{ transform: rotateY(180deg); }
  .card-face{
    position:absolute; inset:0;
    backface-visibility:hidden;
    border-radius: 24px;
    background: var(--parchment);
    box-shadow: var(--shadow);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 26px 22px;
    text-align:center;
    overflow:hidden;
  }
  .card-face::before{
    content:'';
    position:absolute;
    inset: 10px;
    border: 1.5px solid rgba(201,162,39,0.55);
    border-radius: 17px;
    pointer-events:none;
  }
  .card-face .corner{
    position:absolute;
    width: 30px; height:30px;
    opacity:.7;
  }
  .corner.tl{ top:14px; left:14px; }
  .corner.tr{ top:14px; right:14px; transform: scaleX(-1); }
  .corner.bl{ bottom:14px; left:14px; transform: scaleY(-1); }
  .corner.br{ bottom:14px; right:14px; transform: scale(-1,-1); }

  .face-front .arabic{
    font-family:'Amiri', serif;
    font-size: 58px;
    color: var(--ink);
    font-weight: 700;
    direction: rtl;
    line-height:1.2;
  }
  .face-front .tap-hint{
    font-family:'Manrope',sans-serif;
    font-size: 11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color: var(--ink-soft);
    margin-top: 22px;
  }
  .face-back{
    transform: rotateY(180deg);
  }
  .face-back .translit{
    font-family:'Manrope',sans-serif;
    font-size: 13px;
    color: var(--gold-soft);
    letter-spacing:.03em;
    margin-bottom: 10px;
    font-style: italic;
  }
  .face-back .kz-meaning{
    font-family:'Lora', serif;
    font-size: 28px;
    font-weight:600;
    color: var(--ink);
    margin-bottom: 14px;
  }
  .face-back .arabic-small{
    font-family:'Amiri', serif;
    font-size: 30px;
    color: var(--ink-soft);
    direction: rtl;
  }
  .face-back .cat-tag{
    position:absolute;
    bottom: 22px;
    font-family:'Manrope',sans-serif;
    font-size: 10.5px;
    letter-spacing:.1em;
    text-transform:uppercase;
    color: rgba(43,37,25,0.45);
  }

  .answer-buttons{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .ans-btn{
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size: 14px;
    padding: 15px 10px;
    border-radius: 14px;
    border: none;
    cursor:pointer;
    transition: transform .1s ease, filter .15s ease;
  }
  .ans-btn:active{ transform: scale(.97); }
  .ans-btn.know{
    background: linear-gradient(120deg, var(--gold), var(--gold-bright));
    color: #241d0d;
  }
  .ans-btn.dontknow{
    background: rgba(255,255,255,0.06);
    color: var(--parchment);
    border: 1px solid rgba(140,74,56,0.6);
  }
  .flip-hint-wrap{
    text-align:center;
    margin-bottom: 14px;
    font-family:'Manrope',sans-serif;
    font-size: 12px;
    color: rgba(248,243,230,0.45);
    min-height: 18px;
  }

  /* Session end */
  .end-wrap{
    text-align:center;
    padding: 50px 10px 10px;
  }
  .end-wrap .ornament-row svg{ width:34px; height:34px; }
  .end-wrap h2{
    font-family:'Amiri', serif;
    font-size: 26px;
    margin: 14px 0 8px;
    color: var(--gold-bright);
  }
  .end-wrap p{
    font-family:'Manrope',sans-serif;
    font-size: 13.5px;
    color: rgba(248,243,230,0.65);
    margin: 0 0 26px;
  }
  .primary-btn{
    font-family:'Manrope',sans-serif;
    font-weight:700;
    font-size: 14px;
    padding: 14px 26px;
    border-radius: 14px;
    border:none;
    background: linear-gradient(120deg, var(--gold), var(--gold-bright));
    color: #241d0d;
    cursor:pointer;
  }

  /* Settings / footer tools */
  .tools-row{
    display:flex;
    justify-content:center;
    gap: 10px;
    margin-top: 26px;
  }
  .tool-btn{
    font-family:'Manrope',sans-serif;
    font-size: 11.5px;
    color: rgba(248,243,230,0.55);
    background: none;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 12px;
    cursor:pointer;
  }
  .toast{
    position:fixed;
    bottom: 100px;
    left:50%;
    transform: translateX(-50%);
    background: rgba(20,50,45,0.95);
    border: 1px solid var(--line);
    color: var(--parchment);
    font-family:'Manrope',sans-serif;
    font-size: 12.5px;
    padding: 10px 16px;
    border-radius: 12px;
    z-index: 60;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease;
  }
  .toast.show{ opacity:1; }

  @media (prefers-reduced-motion: reduce){
    .card, .cat-card, .bar-fill, .track-inner { transition: none !important; }
  }
</style>
</head>

/* Build flat word list with stable ids */
let TOTAL_WORDS = 0;
CATEGORIES.forEach(cat=>{
  cat.wordObjs = cat.words.map((w,i)=>({
    id: cat.id+'-'+i, ar:w[0], tr:w[1], kz:w[2], catId:cat.id, catName:cat.name
  }));
  TOTAL_WORDS += cat.wordObjs.length;
});

/* ============ SPACED REPETITION STATE (in-memory) ============ */
const INTERVALS_DAYS = [0, 1, 3, 7, 14, 30, 90]; // index = level
const DAY_MS = 24*60*60*1000;

const state = {
  progress: {}, // wordId -> {level, due}
  screen: 'home', // 'home' | 'session'
  sessionQueue: [],
  sessionIndex: 0,
  sessionSourceLabel: '',
  sessionKnownCount: 0,
  cardFlipped: false
};

function ensureProgress(wordId){
  if(!state.progress[wordId]){
    state.progress[wordId] = { level: 0, due: Date.now() };
  }
  return state.progress[wordId];
}
CATEGORIES.forEach(cat=> cat.wordObjs.forEach(w=> ensureProgress(w.id)));

function isWeak(wordId){
  const p = ensureProgress(wordId);
  return p.level <= 2 || p.due <= Date.now();
}
function isMastered(wordId){
  return ensureProgress(wordId).level >= 4;
}

function markAnswer(wordId, knew){
  const p = ensureProgress(wordId);
  if(knew){
    p.level = Math.min(p.level + 1, INTERVALS_DAYS.length - 1);
  } else {
    p.level = 0;
  }
  p.due = Date.now() + INTERVALS_DAYS[p.level]*DAY_MS;
}

function allWeakWords(){
  let list = [];
  CATEGORIES.forEach(cat=> cat.wordObjs.forEach(w=>{
    if(isWeak(w.id)) list.push(w);
  }));
  list.sort((a,b)=> ensureProgress(a.id).due - ensureProgress(b.id).due);
  return list;
}

function categoryMasteredCount(cat){
  return cat.wordObjs.filter(w=>isMastered(w.id)).length;
}
function overallMasteredCount(){
  let n=0;
  CATEGORIES.forEach(cat=> n += categoryMasteredCount(cat));
  return n;
}

/* ============ RENDER ============ */
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');
let toastTimer = null;
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 2200);
}

function ornamentSVG(){
  return `<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M20 2 L23 14 L35 11 L26 20 L35 29 L23 26 L20 38 L17 26 L5 29 L14 20 L5 11 L17 14 Z"
      stroke="var(--gold)" stroke-width="1.1" stroke-linejoin="round"/>
    <circle cx="20" cy="20" r="3.4" fill="var(--gold)"/>
  </svg>`;
}
function cornerOrnamentSVG(){
  return `<svg class="corner" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 2 Q2 16 16 16 Q2 16 2 28" stroke="var(--gold)" stroke-width="1.4" fill="none"/>
    <path d="M2 2 Q16 2 16 16 Q16 2 28 2" stroke="var(--gold)" stroke-width="1.4" fill="none"/>
    <circle cx="2" cy="2" r="2.2" fill="var(--gold)"/>
  </svg>`;
}

function renderHome(){
  const mastered = overallMasteredCount();
  const weakCount = allWeakWords().length;
  let catCards = CATEGORIES.map(cat=>{
    const m = categoryMasteredCount(cat);
    const pct = Math.round((m/cat.wordObjs.length)*100);
    return `
    <div class="cat-card" data-cat="${cat.id}">
      <div class="cat-num">${cat.numeral}</div>
      <div class="cat-body">
        <p class="cat-name">${cat.name}</p>
        <p class="cat-desc">${cat.desc}</p>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="cat-count">${m}/${cat.wordObjs.length}</div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="app-header">
      <div class="ornament-row">${ornamentSVG()}</div>
      <p class="eyebrow">Тәжуид · Лексика · Хифз</p>
      <h1 class="title">Құран сөздері</h1>
      <p class="subtitle">Ең жиі қолданылатын 300 сөз — 7 бөлімге бөлінген</p>
      <div class="progress-ring-wrap">
        <div class="ring-num">${mastered}/${TOTAL_WORDS}</div>
        <div class="ring-label">меңгерілген сөздер<br>жалпы жинақтан</div>
      </div>
    </div>
    <div class="cat-grid">${catCards}</div>
    <div class="tools-row">
      <button class="tool-btn" id="saveBtn">Прогресті сақтау</button>
      <button class="tool-btn" id="loadBtn">Прогресті жүктеу</button>
      <input type="file" id="loadInput" accept="application/json" style="display:none">
    </div>
    <div class="review-fab ${weakCount===0?'empty':''}" id="reviewFab">
      <span>🔁 Қайталауға</span>
      <span class="badge">${weakCount}</span>
    </div>
  `;

  app.querySelectorAll('.cat-card').forEach(el=>{
    el.addEventListener('click', ()=> startSession(el.dataset.cat));
  });
  const fab = document.getElementById('reviewFab');
  fab.addEventListener('click', ()=>{
    const words = allWeakWords();
    if(words.length===0){ showToast('Қазір қайталауға тиісті сөз жоқ 🎉'); return; }
    startSession(null, words, 'Қайталау');
  });
  document.getElementById('saveBtn').addEventListener('click', saveProgress);
  document.getElementById('loadBtn').addEventListener('click', ()=> document.getElementById('loadInput').click());
  document.getElementById('loadInput').addEventListener('change', loadProgress);
}

function startSession(catId, customWords, customLabel){
  let words, label;
  if(customWords){
    words = customWords.slice();
    label = customLabel;
  } else {
    const cat = CATEGORIES.find(c=>c.id===catId);
    words = cat.wordObjs.slice();
    label = cat.name;
  }
  state.sessionQueue = words;
  state.sessionIndex = 0;
  state.sessionKnownCount = 0;
  state.sessionSourceLabel = label;
  state.cardFlipped = false;
  state.screen = 'session';
  renderSession();
}

function renderSession(){
  if(state.sessionIndex >= state.sessionQueue.length){
    renderSessionEnd();
    return;
  }
  const word = state.sessionQueue[state.sessionIndex];
  const pct = Math.round((state.sessionIndex/state.sessionQueue.length)*100);

  app.innerHTML = `
    <div class="session-header">
      <button class="back-btn" id="backBtn">‹ Артқа</button>
      <div class="session-title">${state.sessionSourceLabel}</div>
      <div class="session-progress">${state.sessionIndex+1}/${state.sessionQueue.length}</div>
    </div>
    <div class="track-outer"><div class="track-inner" style="width:${pct}%"></div></div>

    <div class="card-stage">
      <div class="card" id="flipCard">
        <div class="card-face face-front">
          ${cornerOrnamentSVG().replace('corner','corner tl')}
          <div class="arabic">${word.ar}</div>
          <div class="tap-hint">Аудармасын көру үшін түртіңіз</div>
        </div>
        <div class="card-face face-back">
          <div class="translit">${word.tr}</div>
          <div class="kz-meaning">${word.kz}</div>
          <div class="arabic-small">${word.ar}</div>
          <div class="cat-tag">${word.catName}</div>
        </div>
      </div>
    </div>

    <p class="flip-hint-wrap" id="answerHint">Жауапты білу үшін картаны түртіңіз</p>
    <div class="answer-buttons" id="answerButtons" style="visibility:hidden">
      <button class="ans-btn dontknow" id="dontKnowBtn">Әлі есте жоқ</button>
      <button class="ans-btn know" id="knowBtn">Білемін</button>
    </div>
  `;

  document.getElementById('backBtn').addEventListener('click', ()=>{
    state.screen='home'; renderHome();
  });
  const cardEl = document.getElementById('flipCard');
  cardEl.addEventListener('click', ()=>{
    state.cardFlipped = !state.cardFlipped;
    cardEl.classList.toggle('flipped', state.cardFlipped);
    document.getElementById('answerButtons').style.visibility = state.cardFlipped ? 'visible' : 'hidden';
    document.getElementById('answerHint').textContent = state.cardFlipped ? '' : 'Жауапты білу үшін картаны түртіңіз';
  });
  document.getElementById('knowBtn').addEventListener('click', ()=> answerCurrent(true));
  document.getElementById('dontKnowBtn').addEventListener('click', ()=> answerCurrent(false));
}

function answerCurrent(knew){
  const word = state.sessionQueue[state.sessionIndex];
  markAnswer(word.id, knew);
  if(knew) state.sessionKnownCount++;
  state.sessionIndex++;
  state.cardFlipped = false;
  renderSession();
}

function renderSessionEnd(){
  const total = state.sessionQueue.length;
  const known = state.sessionKnownCount;
  app.innerHTML = `
    <div class="end-wrap">
      <div class="ornament-row">${ornamentSVG()}</div>
      <h2>Сессия аяқталды</h2>
      <p>«${state.sessionSourceLabel}» бөлімінен ${total} сөз қаралды.<br>${known} сөзді білетініңізді белгіледіңіз.</p>
      <button class="primary-btn" id="homeBtn">Басты бетке оралу</button>
    </div>
  `;
  document.getElementById('homeBtn').addEventListener('click', ()=>{ state.screen='home'; renderHome(); });
}

/* ============ EXPORT / IMPORT PROGRESS ============ */
function saveProgress(){
  const data = JSON.stringify({ progress: state.progress, savedAt: new Date().toISOString() }, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'quran-sozderi-progress.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Прогресс файлы жүктелді');
}
function loadProgress(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      const data = JSON.parse(evt.target.result);
      if(data && data.progress){
        state.progress = data.progress;
        showToast('Прогресс сәтті жүктелді');
        renderHome();
      } else {
        showToast('Файл форматы дұрыс емес');
      }
    }catch(err){
      showToast('Файлды оқу мүмкін болмады');
    }
  };
  reader.readAsText(file);
}

/* ============ INIT ============ */
renderHome();
</script>
